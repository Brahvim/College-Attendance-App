<!DOCTYPE html>
<html lang="en">

<head>
	<link
		rel="stylesheet"
		href="/index.css"
	>
	<title>ATTENDANCE!</title>
	<script src="/index.js"></script>
</head>

<body>
	<form action="/submit">
		<p id="roll">
		<pre>Enter your <b>Branch</b> & <b>Roll Number</b> ^-^ ✨!
	(<b>Last 4 digits!</b> No zeroes needed!)</pre>
		<pre>
	<input
		id="branch-selector-cs"
		name="branch"
		type="radio"
		value="cs"
		required
	>   CS				<input
		max="22030059999"
		id="roll-input"
		type="number"
		name="roll"
		required
		min="0"
		>
	<input
		id="branch-selector-ee"
		name="branch"
		type="radio"
		value="ee"
		required
	>   EE</pre>
		</p>

		<pre id="reasons-heading"><i>Not coming? <u>Report why</u>:</i></pre>

		<li id="reason-ill">
			<pre>Ill 				<input name="reasonIll" id="reasonIllBox" type="checkbox" ></pre>
		</li>
		<li id="reason-fam">
			<pre>Family issue			<input name="reasonFam" id="reasonFamBox" type="checkbox"></pre>
		</li>
		<li id="reason-evt">
			<pre>Family event				<input name="reasonEvt" id="reasonEvtBox" type="checkbox"></pre>
		</li>
		<button id="mark">MARK ME!</button>
	</form>
</body>

</html>
