<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta
		name="viewport"
		content="width=device-width, initial-scale=1.0"
	>
	<link
		rel="stylesheet"
		href="/index.css"
	>
	<title>ATTENDANCE!</title>
	<script src="/index.js"></script>
</head>

<body>
	<form action="/submit">
		<p id="roll">
		<pre>Gimme your <b>Branch</b> & <b>Roll Number</b> ^-^ ✨!
	(<b>Last 4 digits!</b> No zeroes required!)</pre>
		<pre>
	<input
		id="branch-selector-cs"
		name="branch"
		type="radio"
		value="cs"
		required
	>   CS				<input
		max="22030059999"
		id="roll-input"
		type="number"
		name="roll"
		required
		min="0"
		>
	<input
		id="branch-selector-ee"
		name="branch"
		type="radio"
		value="ee"
		required
	>   EE
		</pre>
		</p>

		<br>
		<p id="reasons-heading"><i>Are you <u>not coming</u>?:</i></p>

		<li id="reason-ill">
			<pre> Ill 				<input
				name="reasonIll"
				type="checkbox"
			> </pre>
		</li>
		<li id="reason-fam">
			<pre> Family issue 		<input
				name="reasonFam"
				type="checkbox"
			> </pre>
		</li>
		<li id="reason-evt">
			<pre> Family event 			<input
				name="reasonEvt"
				type="checkbox"
			> </pre>
		</li>
		<br>
		<button id="mark">MARK ME!</button>
	</form>
</body>

</html>
